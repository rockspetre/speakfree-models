name: Release signed model manifest

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag matching manifest.release
        required: true
        default: v0.2.0

permissions:
  contents: write

concurrency:
  group: model-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Install signing dependency
        run: python -m pip install --disable-pip-version-check cryptography==46.0.4

      - name: Validate release metadata
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          python -c 'import json, os, pathlib; manifest=json.loads(pathlib.Path("manifest/model-manifest.json").read_text()); assert manifest["release"] == os.environ["RELEASE_TAG"], "manifest.release must match the requested tag"'

      - name: Fetch and verify release artifacts
        run: python scripts/fetch_release_assets.py

      - name: Sign manifest
        env:
          SIGNING_KEY: ${{ secrets.SPEAKFREE_MANIFEST_SIGNING_KEY }}
        run: |
          python -c 'import base64, os, pathlib; from cryptography.hazmat.primitives.asymmetric.ed25519 import Ed25519PrivateKey; key=base64.b64decode(os.environ["SIGNING_KEY"], validate=True); assert len(key) == 32, "signing key must be 32 raw bytes"; payload=pathlib.Path("manifest/model-manifest.json").read_bytes(); signature=Ed25519PrivateKey.from_private_bytes(key).sign(payload); pathlib.Path("model-manifest.json.sig").write_text(base64.b64encode(signature).decode() + "\n")'

      - name: Publish immutable release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          gh release create "$RELEASE_TAG" \
            manifest/model-manifest.json \
            model-manifest.json.sig \
            THIRD_PARTY_NOTICES.md \
            release-assets/* \
            --title "Speakfree model catalog $RELEASE_TAG" \
            --notes "Signed Speakfree multilingual speech-to-text catalog for English, Spanish, and German."
